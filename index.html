<!DOCTYPE html>
<html>
<head>
  <title>Start Page</title>

  <style>
    body {body {
  padding-bottom: 100px;
}
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #1c1c1e, #3a3a3c);
      color: white;
      text-align: center;
    }

    .time {
      margin-top: 20px;
      font-size: 20px;
      opacity: 0.8;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 20px;
      max-width: 420px;
      margin: auto;
    }

    .app {
      background: rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      font-size: 12px;
      backdrop-filter: blur(10px);
      transition: 0.15s;
    }

    .app:active {
      transform: scale(0.92);
    }

    .icon {
      font-size: 26px;
      display: block;
      margin-bottom: 5px;
    }

    .dock {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      padding: 10px;
      border-radius: 25px;
      display: flex;
      gap: 15px;
      backdrop-filter: blur(10px);
    }

    .dock div {
      font-size: 22px;
      cursor: pointer;
    }

    /* Search bar (Chrome style) */
    .search {
      margin: 15px auto;
      width: 80%;
      max-width: 400px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="time" id="time"></div>
<h1>🌐 My Start Page</h1>

<!-- Chrome-like search bar -->
<div class="search">
  <input id="searchBox" placeholder="Search or type URL..." onkeydown="handle(event)">
</div>

<div class="grid">

  <div class="app" onclick="openApp('https://google.com')">
    <span class="icon">🔎</span>Google
  </div>

  <div class="app" onclick="openApp('https://youtube.com')">
    <span class="icon">▶️</span>YouTube
  </div>

  <div class="app" onclick="openApp('https://chatgpt.com')">
    <span class="icon">🤖</span>AI
  </div>

  <div class="app" onclick="openApp('https://github.com')">
    <span class="icon">💻</span>GitHub
  </div>

</div>

<!-- iPhone-style dock -->
<div class="dock">
  <div onclick="openApp('https://google.com')">🔎</div>
  <div onclick="openApp('https://youtube.com')">▶️</div>
  <div onclick="openApp('https://gmail.com')">✉️</div>
  <div onclick="openApp('https://maps.google.com')">🗺️</div>
</div>

<script>
function openApp(url) {
  window.open(url, "_blank");
}

// smart search bar
function handle(e) {
  if (e.key === "Enter") {
    let v = document.getElementById("searchBox").value;

    if (v.includes(".")) {
      if (!v.startsWith("http")) v = "https://" + v;
      window.location.href = v;
    } else {
      window.location.href =
        "https://www.google.com/search?q=" + encodeURIComponent(v);
    }
  }
}

// live clock (like phone)
function updateTime() {
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}
setInterval(updateTime, 1000);
updateTime();
</script>
<!DOCTYPE html>
<html>
<head>
  <title>My Home Screen</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
      max-width: 420px;
      margin: auto;
    }

    .app {
      background: #1f1f1f;
      border-radius: 15px;
      padding: 15px;
      cursor: pointer;
      font-size: 12px;
    }

    .app:active {
      transform: scale(0.95);
    }

    .add-box {
      margin: 10px;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      width: 120px;
    }

    button {
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .remove {
      display: block;
      margin-top: 5px;
      font-size: 10px;
      color: red;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📱 My Editable Home Screen</h1>

<div class="add-box">
  <input id="name" placeholder="App name">
  <input id="url" placeholder="URL (https://...)">
  <button onclick="addApp()">Add</button>
</div>

<div class="grid" id="grid"></div>

<script>
let apps = JSON.parse(localStorage.getItem("apps")) || [
  { name: "Google", url: "https://google.com" },
  { name: "YouTube", url: "https://youtube.com" },
  { name: "ChatGPT", url: "https://chatgpt.com" }
];

function save() {
  localStorage.setItem("apps", JSON.stringify(apps));
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  apps.forEach((app, index) => {
    const div = document.createElement("div");
    div.className = "app";

    div.innerHTML = `
      <div onclick="window.open('${app.url}', '_blank')">
        📌 ${app.name}
      </div>
      <div class="remove" onclick="removeApp(${index})">Remove</div>
    `;

    grid.appendChild(div);
  });
}

function addApp() {
  const name = document.getElementById("name").value;
  const url = document.getElementById("url").value;

  if (!name || !url) return;

  apps.push({ name, url });
  save();
  render();

  document.getElementById("name").value = "";
  document.getElementById("url").value = "";
}

function removeApp(index) {
  apps.splice(index, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
</body>
</html>
