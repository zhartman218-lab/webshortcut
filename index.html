<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Start Page</title>

<style>
body {
    margin: 0;
    padding: 0;
    padding-bottom: 120px;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #1c1c1e, #3a3a3c);
    color: white;
    text-align: center;
}

.time {
    margin-top: 20px;
    font-size: 24px;
    opacity: 0.9;
}

h1 {
    margin-top: 10px;
    font-size: 28px;
}

.search {
    width: 85%;
    max-width: 450px;
    margin: 20px auto;
}

.search input {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    box-sizing: border-box;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

.app {
    background: rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.15s;
}

.app:hover {
    transform: scale(1.05);
}

.icon {
    font-size: 28px;
    display: block;
    margin-bottom: 6px;
}

.dock {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    border-radius: 30px;
    padding: 12px 20px;
    display: flex;
    gap: 25px;
    backdrop-filter: blur(10px);
}

.dock div {
    font-size: 28px;
    cursor: pointer;
}

.footer {
    margin-top: 20px;
    font-size: 14px;
}

.footer a {
    color: white;
}
</style>
</head>

<body>

<div class="time" id="clock"></div>

<h1>📱 My Start Page</h1>

<div class="search">
    <input
        id="searchBox"
        placeholder="Search Google or enter a website..."
        onkeydown="search(event)">
</div>

<div class="grid">

    <div class="app" onclick="openSite('https://google.com')">
        <span class="icon">🔎</span>
        Google
    </div>

    <div class="app" onclick="openSite('https://youtube.com')">
        <span class="icon">▶️</span>
        YouTube
    </div>

    <div class="app" onclick="openSite('https://chatgpt.com')">
        <span class="icon">🤖</span>
        ChatGPT
    </div>

    <div class="app" onclick="openSite('https://github.com')">
        <span class="icon">💻</span>
        GitHub
    </div>

    <div class="app" onclick="openSite('https://gmail.com')">
        <span class="icon">✉️</span>
        Gmail
    </div>

    <div class="app" onclick="openSite('https://maps.google.com')">
        <span class="icon">🗺️</span>
        Maps
    </div>

    <div class="app" onclick="openSite('https://drive.google.com')">
        <span class="icon">📁</span>
        Drive
    </div>

    <div class="app" onclick="openSite('https://calendar.google.com')">
        <span class="icon">📅</span>
        Calendar
    </div>

</div>

<div class="footer">
    <a href="https://github.com/zhartman218-lab/issues/new" target="_blank">
        Report a Bug
    </a>
</div>

<div class="dock">
    <div onclick="openSite('https://google.com')">🔎</div>
    <div onclick="openSite('https://youtube.com')">▶️</div>
    <div onclick="openSite('https://gmail.com')">✉️</div>
    <div onclick="openSite('https://maps.google.com')">🗺️</div>
</div>

<script>
function openSite(url) {
    window.open(url, "_blank");
}

function search(event) {
    if (event.key === "Enter") {
        let text = document.getElementById("searchBox").value.trim();

        if (text.includes(".")) {
            if (!text.startsWith("http://") &&
                !text.startsWith("https://")) {
                text = "https://" + text;
            }
            window.location.href = text;
        } else {
            window.location.href =
                "https://www.google.com/search?q=" +
                encodeURIComponent(text);
        }
    }
}

function updateClock() {
    const now = new Date();

    document.getElementById("clock").textContent =
        now.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        });
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
